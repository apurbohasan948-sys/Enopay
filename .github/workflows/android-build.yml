name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Gradle Wrapper
      run: |
        cd android
        gradle wrapper --gradle-version 8.7
        chmod +x gradlew

    - name: Create placeholder google-services.json
      run: |
        if [ ! -f "android/app/google-services.json" ]; then
          echo '{"project_info":{"project_number":"123","project_id":"dummy-id","storage_bucket":"dummy-bucket"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.apurbo.emotions"}},"api_key":[{"current_key":"dummy-key"}],"services":{"appinvite_service":{"status":1}}}]}' > android/app/google-services.json
        fi

    - name: Build with Gradle
      run: cd android && ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
